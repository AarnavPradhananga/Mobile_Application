<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ATM System</title>

  <style>
    body{
      font-family: Arial;
      text-align: center;
      margin-top: 100px;
    }

    input{
      padding: 10px;
      width: 220px;
    }

    button{
      padding: 10px 20px;
      margin: 10px;
    }

    #balance{
      color: green;
    }

    #message{
      color: blue;
      font-size: 20px;
    }
  </style>
</head>

<body>

  <h1>ATM System</h1>

  <h2 id="balance">Current Balance: Rs. 10000</h2>

  <input type="number" id="amount" placeholder="Enter Amount">

  <br>

  <button onclick="withdraw()">Withdraw</button>
  <button onclick="deposit()">Deposit</button>

  <p id="message"></p>

  <script src="script.js"></script>

</body>
</html>
